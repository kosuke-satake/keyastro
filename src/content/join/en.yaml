faqTitle: FAQ
faqSubtitle: Common questions about KeyAstro.
faqList:
  - question: Is it completely free?
    answer: >-
      Yes! Both Astro and Keystatic are open-source and free to use. Cloudflare Pages also offers a generous free tier for hosting.
  - question: How do I change the theme?
    answer: >-
      You can modify the primary colors and font settings in the tailwind.config.js file and global CSS.
  - question: Can I add a new language?
    answer: >-
      Yes. The i18n utility is designed to be easily extensible. You just need to add a new locale to the config and duplicate the content folders.