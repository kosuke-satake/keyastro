membershipTitle: クイックセットアップ
membershipBadge: オープンソース
membershipContent: >-
  リポジトリをクローンし、npmで依存関係をインストールし、開発サーバーを起動して、すぐにサイト構築を始めましょう。
membershipButtonLink: https://github.com
